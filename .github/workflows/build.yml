name: Build

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Clone
        uses: actions/checkout@v6

      - name: Build
        run: dotnet build

      - name: Test
        run: dotnet test --filter TestCategory=unit

      - name: Publish
        run: dotnet publish

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: cgf-converter
          path: cgf-converter\bin\Release\net9.0\win-x64\publish
